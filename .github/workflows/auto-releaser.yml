#---
#name: 'Automatically relase patch versions.'
#
#  on:
#    schedule: # Run every day at 12:00 UTC
#      - cron: '0 12 * * *'
#    workflow_dispatch:
#
#  jobs:
#    release:
#      uses: xmidt-org/shared-go/.github/workflows/ci.yml@826aa545bb56f6c7c551d44febb420c0293c8bff # v4.2.0
#      secrets: inherit
---
name: 'Auto Releaser'

on:
  workflow_call:
    inputs:

      branch:
        description: 'Branch to release from.'
        type: string
        required: false
        default: 'main'

      patch-list:
        description: 'Comma separated list of commit types that should trigger a patch release.'
        type: string
        required: false
        default: >
          bugfix, Bugfix, BugFix, BUGFIX,
          chore, Chore, CHORE,
          fix, Fix, FIX,
          perf,
          refactor, Refactor, REFACTOR,
          test, Test, TEST,
          tests, Tests, TESTS

      minor-list:
        description: 'The specific minor prefix names to use for minors.'
        type: string
        required: false
        default: feat, Feat, FEAT, feature, Feature, FEATURE

      tag-filter:
        description: |
          A string to filter tags by.  By default allows all tags.  This is
          useful if you want to only consider tags that match a certain pattern
          for the next version calculation.

          Primarily this is used to ignore older tags in the shared-go repo that
          are used for testing the release process.

          This is mapped directly into the ietf-tools/semver-action 'tagFilter' input.
        type: string
        required: false
        default: '^.+$'

      which:
        description: Create a 'release' or 'tag'.
        type: string
        required: false
        default: tag

      release-ignore-paths:
        description: |
          Newline-separated list of glob patterns. If every file changed since
          the last matched tag falls within these patterns, the auto-release
          is skipped — preventing patch bumps from chore(deps) or docs/CI
          commits that didn't touch shippable code. Pass an empty string to
          disable the check.
        type: string
        required: false
        default: |
          .github/**
          **/*.md
          LICENSE
          LICENSES/**
          .reuse/**
          .gitignore
          .gitattributes

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Get Next Version
        id: semver
        uses: ietf-tools/semver-action@c90370b2958652d71c06a3484129a4d423a6d8a8 # v1.11.0
        with:
          token:                 ${{ github.token }}
          branch:                ${{ inputs.branch }}
          patchList:             ${{ inputs.patch-list }}
          minorList:             ${{ inputs.minor-list }}
          noVersionBumpBehavior: silent
          noNewCommitBehavior:   silent
          tagFilter:             ${{ inputs.tag-filter }}

      - name: Check for release-worthy changes
        id: should-release
        if: steps.semver.outputs.next != ''
        shell: bash
        env:
          PREVIOUS_TAG: ${{ steps.semver.outputs.current }}
          IGNORE_PATHS: ${{ inputs.release-ignore-paths }}
        run: |
          if [ -z "$PREVIOUS_TAG" ] || [ -z "$IGNORE_PATHS" ]; then
            echo "First release or ignore list disabled — proceeding."
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          EXCLUDES=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            EXCLUDES+=( ":(glob,exclude)$pattern" )
          done <<< "$IGNORE_PATHS"
          if git diff --quiet "$PREVIOUS_TAG" HEAD -- '.' "${EXCLUDES[@]}"; then
            echo "Only ignored paths changed since $PREVIOUS_TAG; skipping release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release-worthy changes detected since $PREVIOUS_TAG."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: No Release Needed
        if: |
          steps.semver.outputs.next == '' ||
          steps.should-release.outputs.release == 'false'
        run: echo "No release needed."

      - name: Create Release
        if: |
          steps.semver.outputs.next != '' &&
          steps.should-release.outputs.release == 'true' &&
          inputs.which == 'release'
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1.21.0
        with:
          name:   ${{ steps.semver.outputs.next }}
          tag:    ${{ steps.semver.outputs.next }}
          commit: ${{ github.sha }}
          token:  ${{ github.token }}

      - name: Create Tag
        if: |
          steps.semver.outputs.next != '' &&
          steps.should-release.outputs.release == 'true' &&
          inputs.which == 'tag'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.semver.outputs.next }}',
              sha: context.sha
            })

      - name: Failure
        if: |
          steps.semver.outputs.next != '' &&
          steps.should-release.outputs.release == 'true' &&
          inputs.which != 'release' &&
          inputs.which != 'tag'
        run: |
          echo "No new version found."
          exit
